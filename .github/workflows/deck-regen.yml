name: Deck regen

on:
  pull_request:
    paths:
      - pnpm-lock.yaml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Detect @iconify-json changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff "origin/${BASE_REF}...HEAD" -- pnpm-lock.yaml | grep -q "@iconify-json/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Regenerate deck
        if: steps.detect.outputs.changed == 'true'
        run: pnpm run build-deck
      - name: Commit and push deck.ts
        if: steps.detect.outputs.changed == 'true'
        run: |
          if git diff --quiet -- src/data/deck.ts; then
            echo "deck.ts に差分はありません"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/deck.ts
            git commit -m "chore: deck.ts を再生成"
            git push
          fi
      - name: Codecheck
        if: steps.detect.outputs.changed == 'true'
        run: pnpm run codecheck
      - name: Test
        if: steps.detect.outputs.changed == 'true'
        run: pnpm run test
