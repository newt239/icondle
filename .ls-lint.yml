ls:
  .dir: kebab-case | regex:^\..+$
  .ts: kebab-case
  .tsx: kebab-case
  .mjs: kebab-case
  .json: kebab-case
  .jsonc: kebab-case
  .yml: kebab-case
  .yaml: kebab-case
  .svg: kebab-case
  .d.ts: kebab-case
  .config.ts: kebab-case
  .config.mjs: kebab-case
  .md: kebab-case | SCREAMING_SNAKE_CASE

  src:
    .dir: kebab-case | regex:^\(.+\)$ | regex:^\[.+\]$
    .ts: kebab-case
    .tsx: kebab-case
    .css: kebab-case
    .spec.ts: kebab-case
    .spec.tsx: kebab-case
    .stories.tsx: kebab-case

    routes:
      .dir: regex:^[a-z0-9$_.-]+$
      .tsx: regex:^[a-z0-9$_.-]+$

  tests:
    .dir: kebab-case
    .ts: kebab-case
    .spec.ts: kebab-case

ignore:
  - node_modules
  - .git
  - .claude
  - .ls-lint.yml
  - .oxlintrc.json
  - .oxfmtrc.json
  - .mcp.json
  - .playwright-mcp
  - .wrangler
  - src/routeTree.gen.ts
